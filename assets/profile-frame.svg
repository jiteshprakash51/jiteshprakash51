<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" style="background:transparent; font-family:'JetBrains Mono', monospace;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="ring-glow-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
    <linearGradient id="cyber-angle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <radialGradient id="center-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#030712" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#070A13" stop-opacity="1" />
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Concentric Cybernetic Rings (Simulated 3D / Holographic Ring) -->
  <g transform="translate(250, 250)">
    <!-- Outer Glowing Boundary -->
    <circle r="235" fill="none" stroke="url(#ring-glow-purple)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="10 15 30 15" />
    <circle r="235" fill="none" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.1" />

    <!-- Secondary Calibration Ring -->
    <circle r="215" fill="none" stroke="#1F2937" stroke-width="1.5" />
    <!-- Ticks on the outer ring -->
    <g stroke="#374151" stroke-width="1">
      <line x1="0" y1="-215" x2="0" y2="-223" />
      <line x1="0" y1="215" x2="0" y2="223" />
      <line x1="-215" y1="0" x2="-223" y2="0" />
      <line x1="215" y1="0" x2="223" y2="0" />
      <line x1="-152" y1="-152" x2="-158" y2="-158" />
      <line x1="152" y1="152" x2="158" y2="158" />
      <line x1="-152" y1="152" x2="-158" y2="158" />
      <line x1="152" y1="-152" x2="158" y2="-158" />
    </g>

    <!-- Main Rotating Cyber Ring (Holographic Segment) -->
    <circle r="195" fill="none" stroke="url(#cyber-angle)" stroke-width="4.5" stroke-dasharray="240 180 80 120" filter="url(#glow-subtle)" />
    <circle r="195" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="10 400 30 180" />

    <!-- Outer Frame Box Background -->
    <polygon points="-160,-160 160,-160 180,-140 180,140 160,160 -160,160 -180,140 -180,-140" fill="url(#center-dark)" stroke="#1F2937" stroke-width="2" />
    <polygon points="-155,-155 155,-155 173,-137 173,137 155,155 -155,155 -173,137 -173,-137" fill="none" stroke="url(#ring-glow-purple)" stroke-width="1" stroke-opacity="0.4" />

    <!-- Corner Brackets (Cyberpunk Accent Corners) -->
    <!-- Top Left -->
    <path d="M -180 -110 L -180 -140 L -160 -160 L -110 -160" fill="none" stroke="#22D3EE" stroke-width="3.5" filter="url(#glow-subtle)" />
    <!-- Top Right -->
    <path d="M 180 -110 L 180 -140 L 160 -160 L 110 -160" fill="none" stroke="#22D3EE" stroke-width="3.5" filter="url(#glow-subtle)" />
    <!-- Bottom Right -->
    <path d="M 180 110 L 180 140 L 160 160 L 110 160" fill="none" stroke="#7C3AED" stroke-width="3.5" filter="url(#glow-subtle)" />
    <!-- Bottom Left -->
    <path d="M -180 110 L -180 140 L -160 160 L -110 160" fill="none" stroke="#7C3AED" stroke-width="3.5" filter="url(#glow-subtle)" />

    <!-- Holographic Scanning Line Visual -->
    <line x1="-165" y1="-80" x2="165" y2="-80" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4" />
    <line x1="-165" y1="80" x2="165" y2="80" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4 4" />

    <!-- Hexagon Face Scan HUD element in the center -->
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="none" stroke="#1F2937" stroke-width="1" />
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="20 40" />

    <!-- Abstract Hologram Head Outline inside -->
    <path d="M -40 -35 C -40 -70, 40 -70, 40 -35 C 40 -15, 30 10, 25 25 C 20 35, -20 35, -25 25 C -30 10, -40 -15, -40 -35 Z" fill="none" stroke="#374151" stroke-width="2" />
    <path d="M -25 33 C -35 45, -50 55, -60 70 L 60 70 C 50 55, 35 45, 25 33 Z" fill="none" stroke="#374151" stroke-width="2" />
    <circle cx="0" cy="-35" r="3" fill="#22D3EE" filter="url(#glow-subtle)" />

    <!-- Crosshair Target -->
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.7" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.7" />
    <circle cx="0" cy="0" r="8" fill="none" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.5" />

    <!-- Floating HUD Coordinate Text -->
    <text x="-160" y="-120" fill="#6B7280" font-size="10" font-weight="bold">FRAME_X_51</text>
    <text x="90" y="130" fill="#6B7280" font-size="10" font-weight="bold">NEPAL_N_27</text>
    <text x="-160" y="130" fill="url(#cyber-angle)" font-size="10" font-weight="bold" filter="url(#glow-subtle)">SYS_OK</text>
    <text x="75" y="-120" fill="#EF4444" font-size="10" font-weight="bold">● LOCK_ON</text>

    <!-- Small Digital Data Bars -->
    <rect x="-160" y="-105" width="40" height="4" fill="#1F2937" rx="1" />
    <rect x="-160" y="-105" width="28" height="4" fill="#22D3EE" rx="1" />

    <rect x="-160" y="-95" width="40" height="4" fill="#1F2937" rx="1" />
    <rect x="-160" y="-95" width="18" height="4" fill="#7C3AED" rx="1" />
  </g>
</svg>
